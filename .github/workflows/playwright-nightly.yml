name: Playwright Nightly (Full)

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:        # allow manual trigger

jobs:
  test:
    name: E2E Full Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.PW_BASE_URL }}" ]; then
            echo "::error::PW_BASE_URL secret is not set"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full e2e suite
        run: npm run test:e2e:ci:nightly
        env:
          PW_BASE_URL: ${{ secrets.PW_BASE_URL }}
          PW_LOGIN_URL: ${{ secrets.PW_LOGIN_URL }}
          PW_PORTAL_URL: ${{ secrets.PW_PORTAL_URL }}
          PW_ADMIN_USERNAME: ${{ secrets.PW_ADMIN_USERNAME }}
          PW_ADMIN_PASSWORD: ${{ secrets.PW_ADMIN_PASSWORD }}
          PW_RESET_EMAIL: ${{ secrets.PW_RESET_EMAIL }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
